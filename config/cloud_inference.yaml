      "moonshotai/kimi-k2.5:online"
    ]
  ai_router_chat:
    model: "meta-llama/llama-3.3-70b-instruct"
    max_tokens: 8192
    temperature: 0.2
    fallback_models: ["openai/gpt-4o-mini"]
  ai_router_synthesis:
    model: "meta-llama/llama-3.3-70b-instruct"
    max_tokens: 8192
    temperature: 0.15
    fallback_models: ["openai/gpt-4o-mini"]
  research_synthesis:
    model: "meta-llama/llama-3.3-70b-instruct"
    max_tokens: 4096
    temperature: 0.25
    fallback_models: ["openai/gpt-4o-mini"]
  research_planner:
    model: "meta-llama/llama-3.1-8b-instruct"
