# Manthana cloud inference — single source of truth (OpenRouter)
# Labs + narratives: primary `moonshotai/kimi-k2.5:online`; fallbacks keep service up if Kimi rate-limits.
# Runtime: OPENROUTER_API_KEY (+ optional OPENROUTER_API_KEY_2). Override path: CLOUD_INFERENCE_CONFIG_PATH.

schema_version: "1"

openrouter_base_url: "https://openrouter.ai/api/v1"
# NVIDIA NIM OpenAI-compatible chat/completions (set NVIDIA_NIM_API_KEY on the gateway/service host).
nim_base_url: "https://integrate.api.nvidia.com/v1"

header_env:
  HTTP-Referer: OPENROUTER_HTTP_REFERER
  X-Title: OPENROUTER_APP_TITLE

defaults:
  max_tokens: 4096
  temperature: 0.2

# Shared fallback chains (OpenRouter slugs)
x_fallabs: &fb_labs
  - "openai/gpt-4o-mini:online"
  - "meta-llama/llama-3.3-70b-instruct"
x_falshort: &fb_short
  - "openai/gpt-4o-mini:online"
x_falvision: &fb_vision
  - "openai/gpt-4o-mini:online"
  - "meta-llama/llama-3.3-70b-instruct"
  - "anthropic/claude-3.5-sonnet"

roles:
  # --- oracle-2 stack ---
  oracle_chat:
    model: "moonshotai/kimi-k2.5:online"
    max_tokens: 8192
    temperature: 0.2
    fallback_models: *fb_labs
  oracle_chat_free:
    model: "openrouter/free"
    max_tokens: 8192
    temperature: 0.2
    fallback_models:
