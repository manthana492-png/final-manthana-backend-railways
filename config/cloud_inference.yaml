# Manthana cloud inference — single source of truth (OpenRouter)
# Orchestration: edit `model` / `fallback_models` per role; runtime secret is OPENROUTER_API_KEY (never commit).
# Default models are sensible OpenRouter slugs — replace with your orchestration choices.

schema_version: "1"

openrouter_base_url: "https://openrouter.ai/api/v1"

# Optional HTTP headers for OpenRouter dashboard attribution (values from env at runtime).
header_env:
  HTTP-Referer: OPENROUTER_HTTP_REFERER
  X-Title: OPENROUTER_APP_TITLE

defaults:
  max_tokens: 4096
  temperature: 0.2

roles:
  # --- oracle-2 stack ---
  oracle_chat:
    model: "moonshotai/kimi-k2.5:online"
    max_tokens: 8192
    temperature: 0.2
    fallback_models: ["openai/gpt-4o-mini:online"]
  oracle_chat_free:
    model: "openrouter/free"
    max_tokens: 8192
    temperature: 0.2
    fallback_models: [
      "qwen/qwen3.6-plus-04-02",
      "stepfun/step-3.5-flash",
      "nvidia/nemotron-3-nano-30b-a3b",
      "nvidia/nemotron-3-super-120b-a12b-20230311",
      "arcee-ai/trinity-large-preview",
      "moonshotai/kimi-k2.5:online"
    ]
  oracle_m5:
    model: "moonshotai/kimi-k2.5:online"
    max_tokens: 4096
    temperature: 0.15
    fallback_models: ["openai/gpt-4o-mini:online"]
  oracle_m5_free:
    model: "openrouter/free"
    max_tokens: 4096
    temperature: 0.15
    fallback_models: [
      "qwen/qwen3.6-plus-04-02",
