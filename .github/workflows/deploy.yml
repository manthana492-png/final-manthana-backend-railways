# Build and deploy Manthana backend. Registry migration runs before containers start.
# Required repo secrets: SERVER_IP, SERVER_USER, SERVER_PRIVATE_SSH_KEY

name: Build and Deploy Manthana Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Repository root = workspace that contains this path (monorepo layout).
        working-directory: "new manthana radiology/manthana-backend"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install pytest torchxrayvision scikit-image torch torchvision
          pip install -r services/01_body_xray/requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: shared:services/01_body_xray:gateway:services/report_assembly

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_SSH_KEY }}
          script: |
            cd /opt/manthana-backend

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Migrating model registry ---"
            python3 scripts/migrate_model_registry.py

            echo "--- Rebuilding containers ---"
            docker compose pull
            docker compose up -d --build --force-recreate gateway body_xray report_assembly

            echo "--- Verifying services ---"
            sleep 10
            curl -sf http://localhost:8000/health || exit 1
            echo "Deploy complete."
