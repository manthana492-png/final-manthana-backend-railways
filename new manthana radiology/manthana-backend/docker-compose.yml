# ══════════════════════════════════════════════════════════
# MANTHANA RADIOLOGY SUITE — Docker Compose
# India's Complete AI Radiology Second-Opinion Suite
# ══════════════════════════════════════════════════════════
# Default `docker compose up`: gateway + modalities + report_assembly (no Redis, no Postgres).
# Profiles: --profile queue (Redis + RQ), --profile pacs (Orthanc + PostgreSQL + pacs_bridge).

version: "3.9"

volumes:
  model_cache:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local
  orthanc_data:
    driver: local
  pacs_db_data:
    driver: local
  consent_data:
    driver: local

networks:
  manthana:
    driver: bridge

services:
  # ════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ════════════════════════════════════════════════════════

  # Optional: docker compose --profile queue up — self-hosted Redis + RQ worker
  redis:
    image: redis:7-alpine
    profiles: ["queue"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - manthana
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file: .env
    environment:
      # Optional overrides (defaults match Docker service names):
      # ULTRASOUND_SERVICE_URL: http://ultrasound:8009/analyze/ultrasound
      # ECG_SERVICE_URL: http://ecg:8013/analyze/ecg
      # PATHOLOGY_SERVICE_URL: http://pathology:8005/analyze/pathology
      # CYTOLOGY_SERVICE_URL: http://cytology:8011/analyze/cytology
      # MAMMOGRAPHY_SERVICE_URL: http://mammography:8012/analyze/mammography
      # LAB_REPORT_SERVICE_URL: http://lab_report:8015/analyze/lab_report
      # DERMATOLOGY_SERVICE_URL: http://dermatology:8016/analyze/dermatology
      # ORAL_CANCER_SERVICE_URL: http://oral_cancer:8014/analyze/oral_cancer
      MODEL_DIR: /models
      XRAY_TRIAGE_POLICY: ${XRAY_TRIAGE_POLICY:-always_deep}
      TRIAGE_ABNORMALITY_THRESHOLD: ${TRIAGE_ABNORMALITY_THRESHOLD:-0.30}
      XRAY_MODEL_IDLE_UNLOAD_SEC: ${XRAY_MODEL_IDLE_UNLOAD_SEC:-180}
      XRAY_UNLOAD_MODE: ${XRAY_UNLOAD_MODE:-gpu_only}
      XRAY_MODEL_IDLE_CHECK_SEC: ${XRAY_MODEL_IDLE_CHECK_SEC:-15}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
    volumes:
      - upload_data:/tmp/manthana_uploads
      - model_cache:/models
      - ./shared:/app/shared
      - consent_data:/app/data
    networks:
      - manthana
    restart: unless-stopped

  # ── PACS (Orthanc DICOM Server) ──
  orthanc:
    image: orthancteam/orthanc:24.11.0
    profiles: ["pacs"]
    ports:
      - "${PORT_ORTHANC_HTTP:-8042}:8042"
      - "${PORT_ORTHANC_DICOM:-4242}:4242"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - ./pacs/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./pacs/lua:/etc/orthanc/lua:ro
    environment:
      ORTHANC_JSON: /etc/orthanc/orthanc.json
    depends_on:
      pacs_db:
        condition: service_healthy
    networks:
      - manthana
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8042/system"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── PACS Database (PostgreSQL for Orthanc index) — docker compose --profile pacs up ──
  pacs_db:
    image: postgres:16-alpine
    profiles: ["pacs"]
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: ${ORTHANC_DB_PASSWORD:-manthana_pacs_2024}
    volumes:
      - pacs_db_data:/var/lib/postgresql/data
    networks:
      - manthana
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── PACS Bridge (Gateway ↔ Orthanc DICOMweb proxy) ──
  pacs_bridge:
    build: ./services/pacs_bridge
    profiles: ["pacs"]
    ports:
      - "${PORT_PACS_BRIDGE:-8030}:8030"
    env_file: .env
    volumes:
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    depends_on:
      orthanc:
        condition: service_healthy
    networks:
      - manthana
    restart: unless-stopped

  report_assembly:
    build: ./services/report_assembly
    ports:
      - "${PORT_REPORT:-8020}:8020"
    env_file: .env
    environment:
      MODEL_DIR: /models
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
    volumes:
      - model_cache:/models
      - ./shared:/app/shared
    networks:
      - manthana
    restart: unless-stopped

  queue_api:
    build: ./services/queue
    profiles: ["queue"]
    ports:
      - "${PORT_QUEUE_API:-8021}:8021"
    env_file: .env
    environment:
      USE_REDIS_QUEUE: "1"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - manthana
    restart: unless-stopped

  queue_worker:
    build: ./services/queue
    profiles: ["queue"]
    command: python worker.py
    env_file: .env
    environment:
      USE_REDIS_QUEUE: "1"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - manthana
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # GPU SERVICES — Heavy (16 GB VRAM)
  # ════════════════════════════════════════════════════════

  body_xray:
    build: ./services/01_body_xray
    ports:
      - "${PORT_BODY_XRAY:-8001}:8001"
    env_file: .env
    environment:
      XRAY_REQUIRE_LLM_NARRATIVE: ${XRAY_REQUIRE_LLM_NARRATIVE:-1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      XRAY_MODEL_IDLE_UNLOAD_SEC: ${XRAY_MODEL_IDLE_UNLOAD_SEC:-180}
      XRAY_UNLOAD_MODE: ${XRAY_UNLOAD_MODE:-gpu_only}
      XRAY_MODEL_IDLE_CHECK_SEC: ${XRAY_MODEL_IDLE_CHECK_SEC:-15}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  brain_mri:
    build: ./services/02_brain_mri
    ports:
      - "${PORT_BRAIN_MRI:-8002}:8002"
    env_file: .env
    environment:
      MONAI_DATA_DIRECTORY: /models/monai
      MRI_NARRATIVE_POLICY: ${MRI_NARRATIVE_POLICY:-openrouter}
      MRI_NARRATIVE_VISION: ${MRI_NARRATIVE_VISION:-1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      MAX_UPLOAD_MB_BRAIN_MRI: ${MAX_UPLOAD_MB_BRAIN_MRI:-512}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  pathology:
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/05_pathology/Dockerfile.railway
    ports:
      - "${PORT_PATHOLOGY:-8005}:8005"
    env_file: .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  cytology:
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/11_cytology/Dockerfile.railway
    ports:
      - "${PORT_CYTOLOGY:-8011}:8011"
    env_file: .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  spine_neuro:
    build: ./services/10_spine_neuro
    ports:
      - "${PORT_SPINE_NEURO:-8010}:8010"
    env_file: .env
    environment:
      CT_SPINE_NARRATIVE_POLICY: ${CT_SPINE_NARRATIVE_POLICY:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      CT_TOTALSEG_IDLE_EMPTY_CACHE_SEC: ${CT_TOTALSEG_IDLE_EMPTY_CACHE_SEC:-0}
      CT_TOTALSEG_IDLE_CHECK_SEC: ${CT_TOTALSEG_IDLE_CHECK_SEC:-30}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # GPU SERVICES — Medium (8 GB VRAM)
  # ════════════════════════════════════════════════════════

  abdominal_ct:
    build: ./services/08_abdominal_ct
    ports:
      - "${PORT_ABDOMINAL_CT:-8008}:8008"
    env_file: .env
    environment:
      MONAI_DATA_DIRECTORY: /models/monai
      CT_ABDOMINAL_NARRATIVE_POLICY: ${CT_ABDOMINAL_NARRATIVE_POLICY:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      CT_TOTALSEG_IDLE_EMPTY_CACHE_SEC: ${CT_TOTALSEG_IDLE_EMPTY_CACHE_SEC:-0}
      CT_TOTALSEG_IDLE_CHECK_SEC: ${CT_TOTALSEG_IDLE_CHECK_SEC:-30}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  cardiac_ct:
    build: ./services/04_cardiac_ct
    ports:
      - "${PORT_CARDIAC_CT:-8004}:8004"
    env_file: .env
    environment:
      MONAI_DATA_DIRECTORY: /models/monai
      CT_CARDIAC_NARRATIVE_POLICY: ${CT_CARDIAC_NARRATIVE_POLICY:-off}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      CT_TOTALSEG_IDLE_EMPTY_CACHE_SEC: ${CT_TOTALSEG_IDLE_EMPTY_CACHE_SEC:-0}
      CT_TOTALSEG_IDLE_CHECK_SEC: ${CT_TOTALSEG_IDLE_CHECK_SEC:-30}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  ct_brain:
    build: ./services/11_ct_brain
    ports:
      - "${PORT_CT_BRAIN:-8017}:8017"
    env_file: .env
    environment:
      CT_BRAIN_NARRATIVE_POLICY: ${CT_BRAIN_NARRATIVE_POLICY:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      CT_BRAIN_TORCHSCRIPT_PATH: ${CT_BRAIN_TORCHSCRIPT_PATH:-}
      CT_BRAIN_CRITICAL_THRESHOLD: ${CT_BRAIN_CRITICAL_THRESHOLD:-0.5}
      CT_BRAIN_DEVICE: ${CT_BRAIN_DEVICE:-cuda}
      CT_BRAIN_CI_DUMMY_MODEL: ${CT_BRAIN_CI_DUMMY_MODEL:-0}
      CT_BRAIN_GPU_IDLE_EMPTY_CACHE_SEC: ${CT_BRAIN_GPU_IDLE_EMPTY_CACHE_SEC:-0}
      CT_BRAIN_GPU_IDLE_CHECK_SEC: ${CT_BRAIN_GPU_IDLE_CHECK_SEC:-30}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8017/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ultrasound:
    build: ./services/09_ultrasound
    ports:
      - "${PORT_ULTRASOUND:-8009}:8009"
    env_file: .env
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
      - ./shared:/app/shared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  mammography:
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/12_mammography/Dockerfile.railway
    ports:
      - "${PORT_MAMMOGRAPHY:-8012}:8012"
    env_file: .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      HF_TOKEN: ${HF_TOKEN}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      MIRAI_HF_REPO: ${MIRAI_HF_REPO:-Lab-Rasool/Mirai}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - manthana
    restart: unless-stopped

  # ════════════════════════════════════════════════════════
  # CPU SERVICES (no GPU needed)
  # ════════════════════════════════════════════════════════

  ecg:
    # Context = this_studio so Dockerfile.railway can COPY packages/manthana-inference + config (narrative_ecg).
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/13_ecg/Dockerfile.railway
    ports:
      - "${PORT_ECG:-8013}:8013"
    env_file: .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
    volumes:
      - upload_data:/tmp/manthana_uploads
    networks:
      - manthana
    restart: unless-stopped

  oral_cancer:
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/14_oral_cancer/Dockerfile.railway
    ports:
      - "${PORT_ORAL_CANCER:-8014}:8014"
    env_file: .env
    environment:
      DEVICE: ${ORAL_DEVICE:-cpu}
      ORAL_CANCER_ENABLED: ${ORAL_CANCER_ENABLED:-true}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
      UNI_MODEL_ID: ${UNI_MODEL_ID:-MahmoodLab/UNI}
    volumes:
      - model_cache:/models
      - upload_data:/tmp/manthana_uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8014/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - manthana
    restart: unless-stopped

  lab_report:
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/15_lab_report/Dockerfile.railway
    ports:
      - "${PORT_LAB_REPORT:-8015}:8015"
    env_file: .env
    environment:
      DEVICE: ${LAB_DEVICE:-cuda}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    volumes:
      - upload_data:/tmp/manthana_uploads
      - model_cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8015/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - manthana
    restart: unless-stopped

  dermatology:
    build:
      context: ../..
      dockerfile: new manthana radiology/manthana-backend/services/16_dermatology/Dockerfile.railway
    ports:
      - "${PORT_DERMATOLOGY:-8016}:8016"
    env_file: .env
    environment:
      DEVICE: ${DERM_DEVICE:-cpu}
      MODEL_DIR: /models
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_API_KEY_2: ${OPENROUTER_API_KEY_2:-}
      CLOUD_INFERENCE_CONFIG_PATH: ${CLOUD_INFERENCE_CONFIG_PATH:-}
      DERM_MAX_UPLOAD_BYTES: ${DERM_MAX_UPLOAD_BYTES:-15728640}
      DERM_MAX_IMAGE_PIXELS: ${DERM_MAX_IMAGE_PIXELS:-36000000}
    volumes:
      - upload_data:/tmp/manthana_uploads
      - model_cache:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8016/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - manthana
    restart: unless-stopped
